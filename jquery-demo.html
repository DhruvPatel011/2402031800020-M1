<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jQuery</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    padding:30px;
}
input{
    padding:10px;
    width:200px;
    font-size:16px;
}
.box{
    width:300px;
    height:150px;
    background:skyblue;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:10px;
    border-radius:10px;
}

.red{
    background:linear-gradient(135deg,#0f0061,rgb(0, 110, 255)) !important;
    color:rgb(255, 255, 255);
    text-shadow: 1px 1px 5px rgb(250, 250, 250);
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

#error{
    color:red;
    display:none;
}
.slider-container{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:20px;
}

#slider{
    width:600px;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}

</style>
</head>
<body>

<h1>JQuery Methods</h1>

<input type="text" id="txtInput" placeholder="Enter Text">
<p id="error">Invalid Input</p>

<br><br>

<button id="hideBtn">Hide</button>
<button id="showBtn">Show</button>
<button id="toggleBtn">Toggle</button>

<button id="fadeInBtn">Fade In</button>
<button id="fadeOutBtn">Fade Out</button>
<button id="fadeToggleBtn">Fade Toggle</button>

<button id="slideUpBtn">Slide Up</button>
<button id="slideDownBtn">Slide Down</button>
<button id="slideToggleBtn">Slide Toggle</button>

<button id="htmlBtn">Change HTML</button>
<button id="appendBtn">Append</button>
<button id="prependBtn">Prepend</button>

<button id="cssBtn">Change CSS</button>
<button id="removeCssBtn">Remove CSS</button>

<div class="box" id="box">Hello jQuery</div>

<div id="content"></div>

<h2>jQuery Image Slider</h2>

<div class="slider-container">

  <button id="prevBtn">⬅</button>

  <img
    id="slider"
    src="https://picsum.photos/id/1015/600/300"
    alt="slider"
  >

  <button id="nextBtn">➡</button>

</div>
<script>

$(document).ready(function(){

    // Hide
    $("#hideBtn").click(function(){
        $("#box").hide();
    });

    // Show
    $("#showBtn").click(function(){
        $("#box").show();
    });

    // Toggle
    $("#toggleBtn").click(function(){
        $("#box").toggle();
    });

    // Fade In
    $("#fadeInBtn").click(function(){
        $("#box").fadeIn(1000);
    });

    // Fade Out
    $("#fadeOutBtn").click(function(){
        $("#box").fadeOut(1000);
    });

    // Fade Toggle
    $("#fadeToggleBtn").click(function(){
        $("#box").fadeToggle(1000);
    });

    // Slide Up
    $("#slideUpBtn").click(function(){
        $("#box").slideUp();
    });

    // Slide Down
    $("#slideDownBtn").click(function(){
        $("#box").slideDown();
    });

    // Slide Toggle
    $("#slideToggleBtn").click(function(){
        $("#box").slideToggle();
    });

    // html()
    $("#htmlBtn").click(function(){

        $("#box").html(
            "<h2 style='color:white'>HTML Changed</h2>"
        );

    });

    // append()
    $("#appendBtn").click(function(){

        $("#content").append(
            "<p>Appended using jQuery</p>"
        );

    });

    // prepend()
    $("#prependBtn").click(function(){

        $("#content").prepend(
            "<p>Prepended using jQuery</p>"
        );

    });

    // css() + addClass()
    $("#cssBtn").click(function(){

        $("#box").addClass("red");

    });

    // removeClass()
    $("#removeCssBtn").click(function(){

        $("#box").removeClass("red");

    });

    // Validation
    $("#txtInput").keyup(function(){

        let value = $(this).val();

        if($.isNumeric(value) && value!=""){
            $("#error").fadeIn();
        }
        else{
            $("#error").fadeOut();
        }

    });
    const images = [

  "https://picsum.photos/id/1015/600/300",

  "https://picsum.photos/id/1016/600/300",

  "https://picsum.photos/id/1018/600/300",

  "https://picsum.photos/id/1020/600/300"

];

let current = 0;

// Next
$("#nextBtn").click(function(){

    $("#slider").fadeOut(500,function(){

        current++;

        if(current >= images.length){
            current = 0;
        }

        $("#slider")
            .attr("src",images[current])
            .fadeIn(500);

    });

});

// Previous
$("#prevBtn").click(function(){

    $("#slider").fadeOut(500,function(){

        current--;

        if(current < 0){
            current = images.length - 1;
        }

        $("#slider")
            .attr("src",images[current])
            .fadeIn(500);

    });

});

// Auto Slider
setInterval(function(){

    $("#nextBtn").click();

},3000);
});

</script>

</body>
</html>
