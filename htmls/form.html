<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;              
    width: 100vw;               
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;          
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.form-container {
    width: 90%;
    max-width: 450px;
    background: #fff;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-size: 30px;
}

.input-box {
    margin-bottom: 18px;
}

.input-box label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #555;
}

.input-box input,
.input-box textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    font-size: 15px;
    transition: 0.3s;
}

.input-box input:focus,
.input-box textarea:focus {
    border-color: #667eea;
    box-shadow: 0 0 8px rgba(102,126,234,0.3);
}

textarea {
    resize: none;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}
</style>
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>

    <form>
        <div class="input-box">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea placeholder="Enter your address" rows="4"></textarea>
        </div>
        
        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
